<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px; padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a; color: #e5e5e5;
    }
    .title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      color: #e8590c;
    }
    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #2a2a2a;
    }
    .status-row:last-child { border-bottom: none; }
    .dot {
      width: 8px; height: 8px; border-radius: 4px; flex-shrink: 0;
    }
    .dot.on { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .label { font-size: 12px; flex: 1; }
    .state { font-size: 10px; font-weight: 600; }
    .state.on { color: #22c55e; }
    .state.off { color: #666; }
    .hint {
      font-size: 10px; color: #666; margin-top: 10px; line-height: 1.5;
    }
    .hint strong { color: #999; }
  </style>
</head>
<body>
  <div class="title">Assistant Coach — Hudl Sync</div>

  <div class="status-row">
    <div class="dot" id="hudl-dot"></div>
    <div class="label">Hudl Tab</div>
    <div class="state" id="hudl-state">—</div>
  </div>

  <div class="status-row">
    <div class="dot" id="app-dot"></div>
    <div class="label">Assistant Coach Tab</div>
    <div class="state" id="app-state">—</div>
  </div>

  <div class="hint" id="hint">
    Open <strong>Hudl</strong> and <strong>Assistant Coach</strong> in separate tabs. The extension syncs them automatically.
  </div>

  <script src="popup.js"></script>
</body>
</html>
